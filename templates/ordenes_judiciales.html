{% extends "base.html" %}

{% block content %}
<style>
    /* ============================================================
       ESTILOS DARK MODE PARA ÓRDENES JUDICIALES
       ============================================================ */
    .orden-card-dark {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        margin-bottom: 20px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    
    .orden-header-dark {
        background: linear-gradient(135deg, #4c1d95, #2d1b69);
        color: #e5e7eb;
        padding: 15px 20px;
        border-bottom: 1px solid #1f2937;
    }
    
    .orden-header-dark h4 {
        margin: 0;
    }
    
    .orden-header-dark h4 i {
        color: #a78bfa;
    }
    
    .badge-dark-orden {
        padding: 3px 12px;
        border-radius: 15px;
        font-size: 11px;
        font-weight: 600;
    }
    
    .badge-dark-orden.activa {
        background: rgba(34, 197, 94, 0.15);
        color: #4ade80;
        border: 1px solid rgba(34, 197, 94, 0.2);
    }
    
    .badge-dark-orden.cumplida {
        background: rgba(96, 165, 250, 0.15);
        color: #60a5fa;
        border: 1px solid rgba(96, 165, 250, 0.2);
    }
    
    .badge-dark-orden.cancelada {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    .btn-icon-dark {
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px 8px;
        border-radius: 5px;
        color: #60a5fa;
        transition: all 0.2s ease;
    }
    
    .btn-icon-dark:hover {
        background: rgba(255,255,255,0.05);
        color: #fbbf24;
    }
    
    .btn-icon-dark i {
        font-size: 16px;
    }
    
    .empty-dark {
        text-align: center;
        padding: 40px;
        color: #6b7280;
    }
    
    .table-dark-custom {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        color: #e5e7eb;
    }
    
    .table-dark-custom thead th {
        background: #1a2236;
        color: #9ca3af;
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 10px 12px;
        border-bottom: 1px solid #1f2937;
    }
    
    .table-dark-custom tbody td {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        color: #e5e7eb;
        vertical-align: middle;
    }
    
    .table-dark-custom tbody tr {
        transition: all 0.2s ease;
    }
    
    .table-dark-custom tbody tr:hover td {
        background: rgba(255,255,255,0.03);
    }
    
    .table-responsive-dark {
        overflow-x: auto;
    }
    
    h1 {
        color: #e5e7eb;
    }
    
    h1 i {
        color: #a78bfa;
    }
    
    .subtitle-dark {
        color: #9ca3af;
        font-size: 14px;
        margin-bottom: 20px;
    }
    
    .text-center {
        text-align: center;
    }
    
    .padding-content {
        padding: 20px;
    }
    
    @media (max-width: 768px) {
        .table-dark-custom {
            font-size: 12px;
        }
        .table-dark-custom thead th,
        .table-dark-custom tbody td {
            padding: 6px 8px;
        }
        .padding-content {
            padding: 12px;
        }
    }
</style>

<h1><i class="fas fa-gavel"></i> Órdenes Judiciales</h1>
<p class="subtitle-dark">Gestión de órdenes de captura, localización y citación</p>

<div class="orden-card-dark">
    <div class="orden-header-dark">
        <h4><i class="fas fa-list"></i> Lista de Órdenes Judiciales</h4>
    </div>
    <div class="padding-content">
        <div class="table-responsive-dark">
            <table class="table-dark-custom" id="tablaOrdenesJudiciales">
                <thead>
                    <tr>
                        <th>N° Único</th>
                        <th>Despacho</th>
                        <th>Fecha Emisión</th>
                        <th>Imputado</th>
                        <th>Delitos</th>
                        <th>Tipo Solicitud</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="8" class="empty-dark">Cargando órdenes...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
function cargarOrdenes() {
    fetch('/api/ordenes_judiciales')
        .then(response => response.json())
        .then(data => {
            const tbody = $('#tablaOrdenesJudiciales tbody');
            tbody.empty();
            
            if (!data || data.length === 0) {
                tbody.html('<tr><td colspan="8" class="empty-dark">No hay órdenes judiciales registradas</td></tr>');
                return;
            }
            
            data.forEach(o => {
                let estadoClass = 'badge-dark-orden activa';
                let estadoText = 'Activa';
                if (o.estado === 'CUMPLIDA') {
                    estadoClass = 'badge-dark-orden cumplida';
                    estadoText = 'Cumplida';
                } else if (o.estado === 'CANCELADA') {
                    estadoClass = 'badge-dark-orden cancelada';
                    estadoText = 'Cancelada';
                }
                
                tbody.append(`
                    <tr>
                        <td><strong>${escapeHtml(o.numero_unico)}</strong></td>
                        <td>${escapeHtml(o.despacho) || '-'}</td>
                        <td>${o.fecha_emision || '-'}</td>
                        <td>${escapeHtml(o.imputado_nombre) || '-'}</td>
                        <td>${escapeHtml(o.delitos) || '-'}</td>
                        <td>${escapeHtml(o.tipo_solicitud) || '-'}</td>
                        <td><span class="${estadoClass}">${estadoText}</span></td>
                        <td>
                            <button class="btn-icon-dark" onclick="verFicha(${o.persona_id})" title="Ver Ficha"><i class="fas fa-eye"></i></button>
                        </td>
                    </tr>
                `);
            });
        })
        .catch(error => console.error('Error:', error));
}

function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function verFicha(id) {
    window.open(`/ficha/${id}`, '_blank');
}

$(document).ready(function() {
    cargarOrdenes();
});
</script>
{% endblock %}
